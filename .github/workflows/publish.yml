name: Publish to Maven Central

# Triggers on any tag of the form v1.2.3 (pushed to master).
# The git tag drives the artifact version: v1.2.3 -> publishes as 1.2.3.
on:
  push:
    tags:
      - 'v*'

jobs:
  # Run the same checks CI normally runs on branch pushes before we publish anything.
  validate:
    name: Pre-publish validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck --no-daemon --warning-mode all

      - name: Run unit tests
        run: ./gradlew :flixelgdx-test:test --no-daemon --warning-mode all

  publish:
    name: Publish artifacts
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to Maven Central
        # Secrets are injected as Gradle project properties via the ORG_GRADLE_PROJECT_ prefix.
        # signingInMemoryKey is the ASCII-armored GPG private key (supports newlines safely as an env var).
        # The artifact version is derived from the git tag: v1.2.3 -> 1.2.3.
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ./gradlew publishAllPublicationsToMavenCentralRepository \
            -PprojectVersion=$VERSION \
            -PskipVlcNatives=true \
            --no-daemon \
            --warning-mode all
