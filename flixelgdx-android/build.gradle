eclipse.project.name = appName + '-android'

apply plugin: 'com.android.library'

def reflectionProfileRaw = (findProperty("flixelReflectionProfile") ?: "STANDARD").toString().trim().toUpperCase(Locale.ROOT)
def reflectionProfile = ["SIMPLE", "STANDARD", "ALL"].contains(reflectionProfileRaw) ? reflectionProfileRaw : "STANDARD"
def reflectionExtraPackages = (findProperty("flixelReflectionExtraPackages") ?: "")
  .toString()
  .split(",")
  .collect { it.trim() }
  .findAll { !it.isEmpty() }

def reflectionPackagePrefixes = ["org.flixelgdx"]
if (reflectionProfile == "STANDARD" || reflectionProfile == "ALL") {
  reflectionPackagePrefixes += "com.badlogic.gdx"
}
if (reflectionProfile == "ALL") {
  reflectionPackagePrefixes += [
    "com.github.tommyettinger",
    "games.rednblack.miniaudio",
    "com.badlogic.gdx.controllers"
  ]
}
reflectionPackagePrefixes += reflectionExtraPackages

def generateReflectionConsumerRules = tasks.register("generateReflectionConsumerRules") {
  def outputDir = layout.buildDirectory.dir("generated/flixel-reflection")
  outputs.dir(outputDir)

  doLast {
    def out = outputDir.get().file("consumer-rules.pro").asFile
    out.parentFile.mkdirs()

    def keepRules = reflectionPackagePrefixes.collect { pkg ->
      "-keep class ${pkg}.** { *; }"
    }.join("\n")

    out.text = """# Auto-generated by flixelgdx-android for consumer keep-rules profile: ${reflectionProfile}
-keepattributes Signature,InnerClasses,EnclosingMethod,*Annotation*
${keepRules}
"""
  }
}

// Native artifact coordinates shared between the "api" configuration (Java/Kotlin classpath)
// and the "natives" configuration (raw .so extraction below). libGDX's native platform jars
// store .so files at the jar root rather than under jni/<abi>/, so AGP's automatic AAR
// packaging cannot find them there. copyAndroidNatives unpacks them into this module's own
// jniLibs source set so they end up in the AAR's standard jni/<abi>/ layout, letting consumers
// depend on flixelgdx-android alone instead of re-declaring every native artifact themselves.
def androidNativeCoordinates = [
  "games.rednblack.miniaudio:gdx-miniaudio-platform:$miniaudioVersion:natives-armeabi-v7a",
  "games.rednblack.miniaudio:gdx-miniaudio-platform:$miniaudioVersion:natives-arm64-v8a",
  "games.rednblack.miniaudio:gdx-miniaudio-platform:$miniaudioVersion:natives-x86",
  "games.rednblack.miniaudio:gdx-miniaudio-platform:$miniaudioVersion:natives-x86_64",
  "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-arm64-v8a",
  "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-armeabi-v7a",
  "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-x86",
  "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-x86_64",
  "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-arm64-v8a",
  "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi-v7a",
  "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86",
  "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86_64",
  "com.crashinvaders.basisu:basisu-wrapper:$basisuGdxVersion:natives-arm64-v8a",
  "com.crashinvaders.basisu:basisu-wrapper:$basisuGdxVersion:natives-armeabi-v7a",
  "com.crashinvaders.basisu:basisu-wrapper:$basisuGdxVersion:natives-x86",
  "com.crashinvaders.basisu:basisu-wrapper:$basisuGdxVersion:natives-x86_64"
]

def nativesOutputDir = layout.buildDirectory.dir("jniLibs")

android {
  namespace "org.flixelgdx"
  compileSdk 36

  publishing {
    singleVariant("release") {
      withSourcesJar()
      withJavadocJar()
    }
  }

  defaultConfig {
    multiDexEnabled = true
    minSdkVersion 24
    targetSdkVersion 35
    consumerProguardFiles "${buildDir}/generated/flixel-reflection/consumer-rules.pro"
  }
  compileOptions {
    coreLibraryDesugaringEnabled = true
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  sourceSets {
    main {
      jniLibs.srcDirs = [nativesOutputDir.get().asFile.path]
    }
  }
}

tasks.matching { it.name == "preBuild" }.configureEach {
  dependsOn generateReflectionConsumerRules
}

repositories {
  // needed for AAPT2, may be needed for other tools
  google()
}

configurations {
  coreLibraryDesugaring
  natives
}

dependencies {
  coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'

  api project(':flixelgdx-core')
  api "androidx.multidex:multidex:2.0.1"
  androidNativeCoordinates.each { coordinates ->
    add("api", coordinates)
    add("natives", coordinates)
  }
  api "com.badlogicgames.gdx:gdx-backend-android:$gdxVersion"
  api "com.badlogicgames.gdx-controllers:gdx-controllers-android:$gdxControllersVersion"
}

// Unpacks the .so files bundled at the root of libGDX's native platform jars into this
// module's own jniLibs source set (see androidNativeCoordinates above for why).
def copyAndroidNatives = tasks.register("copyAndroidNatives") {
  inputs.files(configurations.natives)
  outputs.dir(nativesOutputDir)

  doFirst {
    def abiMap = [
      'armeabi-v7a': 'natives-armeabi-v7a',
      'arm64-v8a'  : 'natives-arm64-v8a',
      'x86'        : 'natives-x86',
      'x86_64'     : 'natives-x86_64'
    ]
    configurations.natives.copy().files.each { jar ->
      def destAbi = abiMap.find { _, suffix -> jar.name.endsWith("${suffix}.jar") }?.key
      if (destAbi != null) {
        def destDir = nativesOutputDir.get().dir(destAbi).asFile
        destDir.mkdirs()
        copy {
          from zipTree(jar)
          into destDir
          include "*.so"
        }
      }
    }
  }
}

afterEvaluate {
  android.libraryVariants.all { variant ->
    def capitalized = variant.name.capitalize()
    def mergeJniTask = tasks.findByName("merge${capitalized}JniLibFolders")
    if (mergeJniTask != null) {
      mergeJniTask.dependsOn(copyAndroidNatives)
    }
    variant.assembleProvider.get().dependsOn(copyAndroidNatives)
  }
}

apply plugin: 'maven-publish'
afterEvaluate {
  publishing {
    publications {
      release(MavenPublication) {
        from components.release
        groupId = project.group
        artifactId = project.name
        version = project.version
        pom {
          name = rootProject.findProperty('pomName') ?: 'FlixelGDX'
          description = rootProject.findProperty('pomDescription')
            ?: 'High-level and powerful game development framework that brings the Flixel philosophy to Java and libGDX.'
          url = rootProject.findProperty('pomUrl') ?: 'https://flixelgdx.org'
          licenses {
            license {
              name = rootProject.findProperty('pomLicenseName') ?: 'MIT License'
              url = rootProject.findProperty('pomLicenseUrl') ?: 'https://opensource.org/licenses/MIT'
              distribution = 'repo'
            }
          }
          developers {
            developer {
              id = rootProject.findProperty('pomDeveloperId') ?: 'stringdotjar'
              name = rootProject.findProperty('pomDeveloperName') ?: 'String'
            }
          }
          scm {
            connection = rootProject.findProperty('pomScmConnection')
              ?: 'scm:git:git://github.com/flixelgdx/flixelgdx.git'
            developerConnection = rootProject.findProperty('pomScmDeveloperConnection')
              ?: 'scm:git:ssh://git@github.com/flixelgdx/flixelgdx.git'
            url = rootProject.findProperty('pomScmUrl') ?: 'https://github.com/flixelgdx/flixelgdx'
          }
        }
      }
    }
  }
}
