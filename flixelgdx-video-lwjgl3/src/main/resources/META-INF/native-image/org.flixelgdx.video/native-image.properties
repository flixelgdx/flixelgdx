# GraalVM native image is not currently supported for the FFmpeg (JavaCPP) desktop
# video backend. JavaCPP's native extraction mechanism depends on runtime class
# loading and System.loadLibrary which are incompatible with closed-world compilation
# without substantial reflection and JNI configuration that is not yet maintained here.
# Games that need native-image support should use the TeaVM (web) backend instead,
# or contribute the tracing-agent output for this module.
